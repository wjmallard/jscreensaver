<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Source for og.png (Open Graph / social card). Render: rsvg-convert -w 1200 -h 630 og.svg -o og.png -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#9bf3b6" opacity="0.05"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="44%" r="72%">
      <stop offset="50%" stop-color="#020503" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#020503"/>
  <rect width="1200" height="630" fill="url(#scan)"/>
  <rect width="1200" height="630" fill="url(#vig)"/>

  <rect x="40" y="40" width="1120" height="550" rx="10"
        fill="none" stroke="#1f7a42" stroke-opacity="0.5" stroke-width="2"/>

  <g font-family="Menlo, Monaco, monospace" text-anchor="middle">
    <text x="600" y="318" font-size="104" font-weight="500" letter-spacing="1" filter="url(#glow)"><tspan fill="#3f9a5e">$ </tspan><tspan fill="#5fdd83">jscreensaver</tspan><tspan fill="#9bf3b6">&#9608;</tspan></text>
    <text x="600" y="406" font-size="33" letter-spacing="3" fill="#6fcf8c">Unix screensavers in your browser</text>
  </g>
</svg>
